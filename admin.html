    </style>
</head>

// ============================================================================
// API LAYER — GAS-first with full local fallback
// Auth flow:
//   1. Check hardcoded admin accounts (instant, always works)
//   2. Check local employee roster
//   3. Try GAS for server-side validation (if above fail)
//   4. Full fallback if GAS unreachable
// ============================================================================
const api = {
    _gasOk: null,
    _lastPing: null,

    async call(action, payload = {}) {
        // Always try GAS first for non-login actions (fire-and-forget for writes)
        if (action !== 'login') {
            try {
                const res = await Promise.race([
                    fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action, ...payload }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    }),
                    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000))
                ]);
                if (res.ok) {
                    const data = await res.json();
                    api._gasOk = true;
                    return data;
                }
            } catch (err) {
                api._gasOk = false;
                console.warn('[GAS] Write failed, logged locally:', err.message);
            }
            // For writes (logActivity, updateEmployee etc.) — local fallback is fine
            return api._local(action, payload);
        }

        // LOGIN — check local accounts first (fastest path), then GAS
        const localResult = api._localLogin(payload);
        if (localResult.success) return localResult;

        // Try GAS auth as secondary for employees not in local list
        try {
            const res = await Promise.race([
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', ...payload }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                }),
                new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 6000))
            ]);
            if (res.ok) {
                const data = await res.json();
                api._gasOk = true;
                if (data.success) return data;
            }
        } catch (err) {
            api._gasOk = false;
            console.warn('[GAS] Auth check failed, using local only:', err.message);
        }

        // Final: if GAS also fails or returns not found, return local error
        return { success: false, error: 'Invalid credentials. Check your email / name and password.' };
    },

    // Fast local login — checks admins + employee roster
    _localLogin(payload) {
        const id = (payload.identifier || '').trim().toLowerCase();
        const pw = (payload.password || '').trim();

        // 1. Check hardcoded admin accounts
        const admin = ADMIN_ACCOUNTS.find(a =>
            (a.email.toLowerCase() === id || a.fullName.toLowerCase() === id) &&
            a.password === pw

        if (admin) return { success: true, user: { ...admin } };

        // 2. Check employee roster

            (e.email.toLowerCase() === id ||
             e.fullName.toLowerCase() === id ||
             e.firstName.toLowerCase() === id ||
             e.employeeId.toLowerCase() === id) &&
            e.password === pw
        );
        if (emp) return { success: true, user: { ...emp } };

        return { success: false };
    },

    _local(action, payload) {
        return new Promise(resolve => setTimeout(() => {
            if (action === 'logActivity') resolve({ success: true, activityId: 'LOCAL-' + Date.now() });
            else if (action === 'updateEmployee') resolve({ success: true });
            else if (action === 'deleteEmployee') resolve({ success: true });
            else if (action === 'ping') resolve({ success: true, status: 'local' });
            else resolve({ success: true, data: [] });
        }, 200));
    },

    async ping() {
        try {
            const res = await Promise.race([
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'ping' }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                }),
                new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
            ]);
            api._gasOk = res.ok;
        } catch {
            api._gasOk = false;
        }
        return api._gasOk;
    }
};

const fmtDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'2-digit', weekday:'short' });
};
const fmtTime = (iso) => new Date(iso).toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
const avatarColors = ['from-blue-500 to-indigo-600','from-purple-500 to-pink-600','from-emerald-500 to-teal-600','from-orange-500 to-red-600','from-cyan-500 to-blue-600'];
const getAvatarColor = (id) => avatarColors[id % avatarColors.length];

function exportToCSV(activities, emp) {
    const rows = [['Date','Day','Time In','Time Out','Total Hours','Description','Status']];
    activities.forEach(a => {
        const d = new Date(a.date);
        rows.push([
            d.toLocaleDateString('en-PH'),
            d.toLocaleDateString('en-US',{weekday:'long'}),
            a.timeIn, a.timeOut, a.totalHours, `"${a.description}"`, a.status
        ]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${emp.firstName}_${emp.lastName}_Activity_Log.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

const EmployeeTracker = ({ user, onLogout, allActivities, setAllActivities }) => {
    const [running, setRunning] = useState(false);
    const [elapsed, setElapsed] = useState(0);
    const [toast, setToast] = useState(null);
    const [sessionStart, setSessionStart] = useState(null);
    const [taskDesc, setTaskDesc] = useState('');
    const [view, setView] = useState('dashboard');
    const intervalRef = useRef(null);

    const myActivities = useMemo(() => allActivities.filter(a => a.empId === user.id).sort((a,b) => new Date(b.date)-new Date(a.date)), [allActivities, user.id]);
    const totalHours = useMemo(() => myActivities.reduce((s,a) => s + (a.totalHours||0), 0), [myActivities]);
    const thisWeek = useMemo(() => {
        const now = new Date(); const week = new Date(now - 7*86400000);
        return myActivities.filter(a => new Date(a.date) >= week).reduce((s,a) => s+(a.totalHours||0),0);
    }, [myActivities]);

    const H = Math.floor(elapsed/3600);
    const M = Math.floor((elapsed%3600)/60);
    const S = elapsed%60;

    const startSession = () => {
        setRunning(true);
        setSessionStart(new Date());
        intervalRef.current = setInterval(() => setElapsed(p => p+1), 1000);
        setToast({ message: 'Session started. Timer is running!', type: 'info' });
    };

    const stopSession = async () => {
        clearInterval(intervalRef.current);
        setRunning(false);

                                        {myActivities.map(a => (

                                                <td className="font-bold text-sm whitespace-nowrap">{fmtDate(a.date)}</td>

                                                <td className="font-mono text-sm">{a.timeOut}</td>

                                                <td><span className="text-[10px] font-bold px-2 py-1 rounded-md bg-white/5 border border-white/10">{a.source||'Manual'}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                )}
            </main>
        </div>
    );
};

    const [logTarget, setLogTarget] = useState(null);

    const deptEmps = useMemo(() => {
        let list = selDept === 'ALL' ? employees : employees.filter(e => e.deptId === selDept.id);

            const q = empSearch.toLowerCase();
            list = list.filter(e => e.fullName.toLowerCase().includes(q) || e.employeeId.toLowerCase().includes(q));

        return list;

    const empActs = useMemo(() => activities.filter(a => a.empId === selEmp?.id), [activities, selEmp]);

        const set = new Set(empActs.map(a => new Date(a.date).toLocaleString('default',{month:'long',year:'numeric'})));
        return [...set];
    }, [empActs]);

    const filteredActs = useMemo(() => {
        let list = empActs;
        if (selMonth !== 'All') list = list.filter(a => new Date(a.date).toLocaleString('default',{month:'long',year:'numeric'}) === selMonth);
        return [...list].sort((a,b) => sortOrder === 'desc' ? new Date(b.date)-new Date(a.date) : new Date(a.date)-new Date(b.date));
    }, [empActs, selMonth, sortOrder]);

    const empTotalHours = useMemo(() => empActs.reduce((s,a) => s+(a.totalHours||0),0), [empActs]);

    // ── DIRECTORY LOGIC ──
    const filteredDir = useMemo(() => {
        let list = employees;
        if (dirDept !== 'ALL') list = list.filter(e => e.deptId === parseInt(dirDept));
        if (dirStatus !== 'ALL') list = list.filter(e => e.status === dirStatus);
        if (dirSearch.trim()) {
            const q = dirSearch.toLowerCase();
            list = list.filter(e => e.fullName.toLowerCase().includes(q) || e.email.toLowerCase().includes(q) || e.employeeId.toLowerCase().includes(q) || e.role.toLowerCase().includes(q));
        }
        return list;
    }, [employees, dirDept, dirStatus, dirSearch]);

    // ── CRUD ──
    const openAdd = () => {
        setEditEmp(null);
        setEmpForm({ firstName:'', lastName:'', email:'', deptId:1, role:'Staff', employeeId:`GHZ-${Math.floor(Math.random()*9000)+1000}`, status:'Active', password:'ghz2025' });
        setModal('add');
    };
    const openEdit = (emp) => { setEditEmp(emp); setEmpForm({...emp}); setModal('edit'); };
    const saveEmp = async (e) => {
        e.preventDefault();
        if (editEmp) {

    };

        setEmployees(prev => prev.filter(e => e.id !== id));

                                <p className="text-[11px] font-bold uppercase tracking-widest text-red-400/60 mt-1">Reset all local state. Irreversible.</p>
                            </div>
                            <button onClick={() => { if(confirm('Hard reset all local data?')) { setEmployees(EMPLOYEES_INIT); setActivities(ACTS_INIT); showToast('System reset complete.','warn'); } }}
                                className="px-5 py-2.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-xl font-bold border border-red-500/25 transition flex items-center gap-2 text-sm shrink-0">
                                <i className="fa-solid fa-triangle-exclamation"></i> Hard Reset
                            </button>
                        </div>
                    </div>

                    {/* Build Info */}
                    <div className="glass p-5 rounded-2xl border border-white/10 text-center">
                        <p className="text-[11px] font-bold text-[var(--tx3)] uppercase tracking-widest">
                            Gigahertz Nexus Activity Tracker • Build v3.0 • {new Date().getFullYear()}
                        </p>
                        <p className="text-[10px] text-[var(--tx3)] mt-1 opacity-60">Developed for internal Gigahertz operations. Authorized personnel only.</p>
                    </div>
                </div>
            )}
        </div>
    );
};

// ============================================================================
// ROOT APP
// ============================================================================
const App = () => {
    const [user, setUser] = useState(null);
    const [theme, setTheme] = useState('dark');
    const [activities, setActivities] = useState(ACTS_INIT);

    const changeTheme = (t) => {
        setTheme(t);
        document.documentElement.setAttribute('data-theme', t);
    };

    if (!user) return <AuthPortal onLogin={setUser} theme={theme} toggleTheme={changeTheme}/>;

    if (user.role === 'ADMIN' || user.role === 'Super Admin') {
        return <AdminOS user={user} onLogout={() => setUser(null)} theme={theme} setTheme={changeTheme}/>;
    }

    return <EmployeeTracker user={user} onLogout={() => setUser(null)} allActivities={activities} setAllActivities={setActivities}/>;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
